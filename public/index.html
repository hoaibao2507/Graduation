<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiệp Mời Tốt Nghiệp - Chung Thắm</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="background-decorations">
        <span class="icon i1">🎓</span>
        <span class="icon i2">📜</span>
        <span class="icon i3">✨</span>
        <span class="icon i4">🎓</span>
        <span class="icon i5">📜</span>
        <span class="icon i6">✨</span>
    </div>

    <div class="main-wrapper">
        <header class="school-header">
            <img src="logo.png" alt="Logo UEL" class="school-logo">
            <h3 class="school-name">ĐẠI HỌC KINH TẾ - LUẬT</h3>
            <p class="vnu-name">ĐHQG TP. HỒ CHÍ MINH</p>
        </header>

        <section class="invitation-content">
            <div class="intro-text">
                <p>Trân trọng kính mời: <span id="guest-name" style="color: var(--gold); font-size: 1.2rem; font-weight: bold;">Anh/Chị/Em & Bạn bè</span></p>
                <h1>LỄ TỐT NGHIỆP</h1>
                <h2 class="personal-name">Chung Thắm</h2>
            </div>

            <div class="photo-stage">
                <div class="main-frame">
                    <img src="1.jpg" alt="Chung Thắm" class="portrait">
                </div>

                <div class="floating-photos">
                    <div class="f-photo p1"><img src="2.jpg" alt="Kỷ niệm 1"></div>
                    <div class="f-photo p2"><img src="3.jpg" alt="Kỷ niệm 2"></div>
                    <div class="f-photo p3"><img src="4.jpg" alt="Kỷ niệm 3"></div>
                    <div class="f-photo p4"><img src="5.jpg" alt="Kỷ niệm 4"></div>
                </div>
            </div>

            <div class="info-card">
                <div class="info-row">
                    <span class="label">THỜI GIAN:</span>
                    <span class="value">16h00 | 12.05.2026</span>
                </div>
                <div class="info-row">
                    <span class="label">ĐỊA ĐIỂM:</span>
                    <span class="value">Khuôn viên trường UEL</span>
                </div>
            </div>

            <footer class="final-msg">
                Sự hiện diện của mọi người là niềm vinh dự lớn nhất của mình!
            </footer>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
